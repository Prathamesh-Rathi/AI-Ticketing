{% extends "base.html" %}
{% block title %}Not Found · TicketAI{% endblock %}
{% block breadcrumb %}404{% endblock %}
{% block content %}

<div style="display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;text-align:center;">
  <div style="font-size:80px;font-weight:700;font-family:var(--mono);
    color:var(--border-2);line-height:1;margin-bottom:16px;
    letter-spacing:-0.05em;">
    404
  </div>
  <div style="font-size:18px;font-weight:600;color:var(--text-1);
    margin-bottom:8px;">
    Page not found
  </div>
  <div style="font-size:14px;color:var(--text-3);margin-bottom:28px;
    max-width:340px;line-height:1.6;">
    The page you're looking for doesn't exist or has been moved.
  </div>
  <div style="display:flex;gap:10px;">
    <a href="/" class="btn btn-primary">Go to Dashboard</a>
    <a href="/tickets" class="btn btn-ghost">View Tickets</a>
  </div>
</div>

{% endblock %}
