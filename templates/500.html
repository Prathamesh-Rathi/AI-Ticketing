{% extends "base.html" %}
{% block title %}Error · TicketAI{% endblock %}
{% block breadcrumb %}Error{% endblock %}
{% block content %}

<div style="display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;text-align:center;">
  <div style="font-size:80px;font-weight:700;font-family:var(--mono);
    color:rgba(239,68,68,0.15);line-height:1;margin-bottom:16px;
    letter-spacing:-0.05em;">
    500
  </div>
  <div style="font-size:18px;font-weight:600;color:var(--text-1);
    margin-bottom:8px;">
    Something went wrong
  </div>
  <div style="font-size:14px;color:var(--text-3);margin-bottom:16px;
    max-width:360px;line-height:1.6;">
    An unexpected error occurred on the server.
  </div>
  {% if error %}
  <div style="font-family:var(--mono);font-size:12px;color:var(--red);
    background:var(--red-bg);border:1px solid rgba(239,68,68,0.2);
    border-radius:8px;padding:10px 16px;margin-bottom:24px;
    max-width:500px;text-align:left;word-break:break-all;">
    {{ error }}
  </div>
  {% endif %}
  <div style="display:flex;gap:10px;">
    <a href="/" class="btn btn-primary">Go to Dashboard</a>
    <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
  </div>
</div>

{% endblock %}
